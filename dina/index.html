<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дина — массаж в Челябинске</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💆</text></svg>">
<meta name="description" content="Дина. Массаж в Челябинске. Университетская набережная, 107. Запись по телефону 8-900-000-00-00">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: #1F3D26;
    background:
      radial-gradient(1200px 800px at 80% -10%, #C9DCC4 0%, transparent 60%),
      radial-gradient(900px 700px at -10% 110%, #D7E5D2 0%, transparent 55%),
      linear-gradient(180deg, #F4F8F1 0%, #E9F0E5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 18px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: #FBFCFA;
    border-radius: 28px;
    padding: 44px 32px 36px;
    position: relative;
    box-shadow:
      0 30px 60px -25px rgba(47, 93, 58, 0.30),
      0 12px 24px -12px rgba(47, 93, 58, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(47, 93, 58, 0.08);
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: -60px;
    right: -60px;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(168, 201, 168, 0.35) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .card::after {
    content: "";
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, rgba(184, 134, 11, 0.08) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .top {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .mono {
    width: 84px;
    height: 84px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2F5D3A 0%, #4A7C56 100%);
    color: #F4F8F1;
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 44px;
    font-weight: 400;
    line-height: 84px;
    text-align: center;
    letter-spacing: -0.02em;
    box-shadow:
      0 8px 18px -6px rgba(47, 93, 58, 0.45),
      inset 0 -2px 6px rgba(0, 0, 0, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
    position: relative;
  }
  .mono::after {
    content: "";
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 1px solid rgba(244, 248, 241, 0.35);
    pointer-events: none;
  }

  h1 {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 38px;
    font-weight: 400;
    margin: 0 0 8px;
    color: #1F3D26;
    letter-spacing: -0.01em;
  }

  .role {
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #6B7E6E;
    margin: 0 0 4px;
  }
  .city {
    font-size: 13px;
    color: #8B9D8C;
    margin: 0;
  }

  .divider {
    margin: 28px auto 26px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: #B8860B;
  }
  .divider .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #C9A227 50%, transparent 100%);
    opacity: 0.55;
  }
  .divider svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .contacts {
    position: relative;
    z-index: 1;
  }
  .row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 4px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s ease;
  }
  a.row:active { transform: scale(0.98); }

  .icon {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: rgba(47, 93, 58, 0.08);
    color: #2F5D3A;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg { width: 18px; height: 18px; }

  .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #8B9D8C;
    margin: 0 0 2px;
  }
  .value {
    font-size: 17px;
    color: #1F3D26;
    font-weight: 500;
    line-height: 1.35;
  }
  a.row .value { color: #2F5D3A; }

  .cta {
    display: block;
    margin-top: 26px;
    padding: 18px 24px;
    text-align: center;
    background: linear-gradient(135deg, #2F5D3A 0%, #4A7C56 100%);
    color: #F4F8F1;
    text-decoration: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.02em;
    box-shadow:
      0 10px 22px -10px rgba(47, 93, 58, 0.55),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    z-index: 1;
  }
  .cta:hover {
    box-shadow:
      0 14px 28px -10px rgba(47, 93, 58, 0.65),
      inset 0 1px 0 rgba(255, 255, 255, 0.22);
  }
  .cta:active { transform: scale(0.98); }
  .cta svg { vertical-align: -3px; margin-right: 8px; width: 18px; height: 18px; }

  footer {
    margin-top: 22px;
    text-align: center;
    font-size: 12px;
    color: #8B9D8C;
    letter-spacing: 0.05em;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 380px) {
    .card { padding: 36px 22px 28px; }
    h1 { font-size: 32px; }
    .mono { width: 72px; height: 72px; line-height: 72px; font-size: 36px; }
  }
</style>
</head>
<body>
  <main class="card">
    <div class="top">
      <div class="mono">Д</div>
      <h1>Дина</h1>
      <p class="role">Массаж</p>
      <p class="city">Челябинск</p>
    </div>

    <div class="divider">
      <span class="line"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 22c4-2 7-6 7-11 0-4-3-7-7-7s-7 3-7 7c0 5 3 9 7 11z"/>
        <path d="M12 12c0-3 1.5-5 4-5"/>
        <path d="M12 12c0-3-1.5-5-4-5"/>
        <path d="M12 12c0 2 .8 4 2 5"/>
        <path d="M12 12c0 2-.8 4-2 5"/>
      </svg>
      <span class="line"></span>
    </div>

    <div class="contacts">
      <a class="row" href="tel:+79000000000">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </span>
        <span>
          <span class="label">Телефон</span>
          <span class="value">8-900-000-00-00</span>
        </span>
      </a>

      <a class="row" href="https://yandex.ru/maps/?text=Челябинск,+Университетская+набережная,+107" target="_blank" rel="noopener">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </span>
        <span>
          <span class="label">Адрес</span>
          <span class="value">Университетская набережная, 107<br>Челябинск</span>
        </span>
      </a>
    </div>

    <a class="cta" href="tel:+79000000000">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      Позвонить
    </a>

    <footer>запись по телефону</footer>
  </main>
</body>
</html>
